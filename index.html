<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ROBOOTEC.AI AI Vibe Trading App MVP UI demo for no-code strategy creation, benchmark validation and paper trading."
    />
    <title>ROBOOTEC.AI | AI Vibe Trading App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"]
            },
            boxShadow: {
              glow: "0 0 32px rgba(34, 211, 238, 0.18)",
              violetGlow: "0 0 36px rgba(139, 92, 246, 0.2)"
            }
          }
        }
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        min-width: 320px;
        background: #05070d;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
      }

      button,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      ::selection {
        background: rgba(103, 232, 249, 0.35);
        color: white;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
      async function bootPreview() {
        const source = await fetch("./src/App.jsx").then((response) =>
          response.text()
        );
        const patched = source
          .replace(
            'import { useEffect, useMemo, useState } from "react";',
            "const { useEffect, useMemo, useState } = React;"
          )
          .replace("export default App;", "window.App = App;");
        const compiled = Babel.transform(patched, {
          presets: [["react", { runtime: "classic" }]]
        }).code;

        Function("React", compiled)(React);
        ReactDOM.createRoot(document.getElementById("root")).render(
          React.createElement(
            React.StrictMode,
            null,
            React.createElement(window.App)
          )
        );
      }

      bootPreview().catch((error) => {
        document.getElementById("root").innerHTML =
          '<pre style="color:#fca5a5;padding:24px;white-space:pre-wrap">' +
          error.stack +
          "</pre>";
      });
    </script>
  </body>
</html>
